<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="92" fill="url(#bg)" stroke="#e94560" stroke-width="3"/>
  <!-- Inner compass ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Trinity triangle -->
  <polygon points="100,30 38,130 162,130" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Inner inverted triangle -->
  <polygon points="100,145 55,65 145,65" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Center compass needle (pointing up) -->
  <polygon points="100,42 93,105 107,105" fill="#2ecc71"/>
  <!-- Center compass needle (pointing down) -->
  <polygon points="100,128 93,105 107,105" fill="rgba(255,255,255,0.35)"/>
  <!-- Center dot -->
  <circle cx="100" cy="105" r="6" fill="#fff"/>
  <circle cx="100" cy="105" r="3" fill="#2ecc71"/>
  <!-- North star marker -->
  <polygon points="100,11 102.2,16.8 108.5,16.8 103.2,20.5 105.3,26.3 100,22.6 94.7,26.3 96.8,20.5 91.5,16.8 97.8,16.8" fill="#2ecc71"/>
  <circle cx="100" cy="182" r="2.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="18" cy="100" r="2.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="182" cy="100" r="2.5" fill="rgba(255,255,255,0.4)"/>
  <!-- "三" character hint - three horizontal bars at bottom -->
  <rect x="82" y="155" width="36" height="2.5" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="86" y="162" width="28" height="2.5" rx="1" fill="rgba(255,255,255,0.35)"/>
  <rect x="90" y="169" width="20" height="2.5" rx="1" fill="rgba(255,255,255,0.2)"/>
</svg>
